<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>skull.obf</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0a0b0d;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #111318;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 50, 50, 0.25);
            box-shadow: 0 0 25px rgba(255, 50, 50, 0.1);
            min-width: 0;
        }
        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ff4444;
            text-shadow: 0 0 12px rgba(255, 68, 68, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }
        .panel-title .badge {
            font-size: 12px;
            background: #1e2430;
            padding: 2px 10px;
            border-radius: 20px;
            color: #8a9bb5;
            font-weight: 400;
        }
        .upload-zone {
            border: 2px dashed rgba(255, 68, 68, 0.2);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .upload-zone:hover {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.05);
        }
        .upload-zone .upload-text {
            font-size: 14px;
            color: #ccd;
        }
        .upload-zone .upload-subtext {
            font-size: 12px;
            color: #6c757d;
        }
        .text-zone {
            flex: 1;
            min-height: 0;
            width: 100%;
            background-color: #161920;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px;
            color: #e0e4f0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            tab-size: 4;
            spellcheck: false;
        }
        .text-zone:focus {
            border-color: #ff4444;
            box-shadow: 0 0 5px rgba(255, 68, 68, 0.2);
        }
        .text-zone.output {
            background-color: #0d0f14;
            color: #8fff8f;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
            flex-shrink: 0;
            align-items: center;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1e26;
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .checkbox-group input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            background: #0d0f14;
            border: 2px solid #3a4050;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .checkbox-group input[type="checkbox"]:checked {
            background: #ff4444;
            border-color: #ff4444;
            box-shadow: 0 0 8px rgba(255, 68, 68, 0.4);
        }
        .checkbox-group label {
            font-size: 13px;
            color: #ccd;
            cursor: pointer;
            user-select: none;
        }
        .checkbox-group .hint {
            font-size: 11px;
            color: #6c757d;
            margin-left: 4px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-primary {
            background: #ff4444;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
        }
        .btn-primary:hover {
            background: #cc3333;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #2a2f3a;
            color: #ccd;
        }
        .btn-secondary:hover {
            background: #3a4050;
        }
        .btn-success {
            background: #28a745;
            color: #fff;
        }
        .btn-success:hover {
            background: #218838;
        }
        .status {
            margin-top: 8px;
            font-size: 13px;
            color: #8a9bb5;
            text-align: center;
            flex-shrink: 0;
            height: 20px;
        }
        .text-zone::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .text-zone::-webkit-scrollbar-track {
            background: #1a1e26;
            border-radius: 4px;
        }
        .text-zone::-webkit-scrollbar-thumb {
            background: #2a3040;
            border-radius: 4px;
        }
        .text-zone::-webkit-scrollbar-thumb:hover {
            background: #3a4a60;
        }
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                padding: 10px;
                gap: 10px;
                height: 100vh;
            }
            .panel {
                min-height: 45vh;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .checkbox-group {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- LEFT PANEL: Input -->
    <div class="panel" id="inputPanel">
        <div class="panel-title">
            💀 skull.obf
            <span class="badge">.lua / .txt</span>
        </div>
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-text">📁 Drag &amp; drop your Luau script here</div>
            <div class="upload-subtext">or click to browse</div>
            <input type="file" id="fileInput" style="display: none;" accept=".lua,.txt" />
        </div>
        <textarea class="text-zone" id="sourceCode" placeholder="-- Paste your Luau source code here..."></textarea>
        <div class="controls">
            <div class="checkbox-group">
                <input type="checkbox" id="antiTamperCheck" checked />
                <label for="antiTamperCheck">
                    🔒 Anti‑Tamper
                    <span class="hint">(Luraph‑grade protection)</span>
                </label>
            </div>
            <button class="btn btn-primary" id="obfuscateBtn">⚡ Obfuscate</button>
            <button class="btn btn-secondary" id="clearBtn">🗑️ Clear</button>
        </div>
        <div class="status" id="statusLeft">Ready – paste or load a script.</div>
    </div>

    <!-- RIGHT PANEL: Output -->
    <div class="panel" id="outputPanel">
        <div class="panel-title">
            🔒 Obfuscated Code
            <span class="badge" id="outputSize">0 characters</span>
        </div>
        <textarea class="text-zone output" id="obfuscatedOutput" readonly placeholder="Obfuscated code will appear here..."></textarea>
        <div class="controls" style="justify-content: flex-end;">
            <button class="btn btn-success" id="copyBtn">📋 Copy</button>
            <button class="btn btn-secondary" id="downloadBtn">⬇️ Download</button>
        </div>
        <div class="status" id="statusRight">Ready</div>
    </div>

    <script>
        // ===== DOM references =====
        const sourceCode = document.getElementById('sourceCode');
        const obfuscatedOutput = document.getElementById('obfuscatedOutput');
        const obfuscateBtn = document.getElementById('obfuscateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusLeft = document.getElementById('statusLeft');
        const statusRight = document.getElementById('statusRight');
        const outputSize = document.getElementById('outputSize');
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const antiTamperCheck = document.getElementById('antiTamperCheck');

        // ===== File upload =====
        fileInput.addEventListener('change', function(e) {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                sourceCode.value = ev.target.result;
                statusLeft.textContent = `✅ Loaded: ${file.name} (${file.size} bytes)`;
            };
            reader.onerror = function() {
                statusLeft.textContent = '❌ Failed to read file.';
            };
            reader.readAsText(file);
            this.value = '';
        });

        // ===== Drag and drop =====
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.style.borderColor = '#ff4444';
            this.style.background = 'rgba(255, 68, 68, 0.1)';
        });
        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.style.borderColor = 'rgba(255, 68, 68, 0.2)';
            this.style.background = 'rgba(0, 0, 0, 0.2)';
        });
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            this.style.borderColor = 'rgba(255, 68, 68, 0.2)';
            this.style.background = 'rgba(0, 0, 0, 0.2)';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                fileInput.dispatchEvent(new Event('change'));
            }
        });

        // ===== Multi‑layer checksum (Luraph‑style) =====
        function generateChecksum(code) {
            let h1 = 0, h2 = 0, h3 = 0;
            for (let i = 0; i < code.length; i++) {
                const c = code.charCodeAt(i);
                h1 = ((h1 << 5) - h1 + c) >>> 0;
                h2 = ((h2 * 31 + c) * 7) >>> 0;
                h3 = ((h3 * 2654435761 + c * 17) >>> 0) ^ (h3 << 7);
            }
            return { h1, h2, h3 };
        }

        // ===== Luraph‑grade obfuscation with multi‑layer anti‑tamper =====
        function obfuscateLuau(code, includeAntiTamper) {
            // Convert to hex
            let hex = '';
            for (let i = 0; i < code.length; i++) {
                let charCode = code.charCodeAt(i);
                let hexByte = charCode.toString(16);
                if (hexByte.length < 2) hexByte = '0' + hexByte;
                hex += hexByte;
            }

            const header = '-- What obfuscator is this? Ive never seen it before + it looks so weird!';

            if (!includeAntiTamper) {
                return `${header}\nlocal function _d(s)\n    local t={}\n    for i=1,#s,2 do\n        t[#t+1]=string.char(tonumber(s:sub(i,i+1),16))\n    end\n    return table.concat(t)\nend\nloadstring(_d("${hex}"))()\n`;
            }

            const checksums = generateChecksum(code);
            const errorMsg = 'ts gng really thought he could steal my code skid of skids lol';

            // Luraph‑grade anti‑tamper: 
            // 1. Multi‑layer checksum (3 different hash algorithms)
            // 2. __tostring trap (hijacks string metatable)
            // 3. Self‑verifying code that checks itself
            // 4. Sensitive opcode protection
            // 5. Anti‑debugging via pcall unpack crash
            return `${header}
            local function _d(s)
                local t={}
                for i=1,#s,2 do
                    t[#t+1]=string.char(tonumber(s:sub(i,i+1),16))
                end
                return table.concat(t)
            end

            -- ===== LAYER 1: Multi‑Layer Checksum =====
            local function _c1(s)
                local h=0
                for i=1,#s do
                    h=((h<<5)-h+string.byte(s,i))%4294967296
                end
                return h
            end
            local function _c2(s)
                local h=0
                for i=1,#s do
                    h=((h*31+string.byte(s,i))*7)%4294967296
                end
                return h
            end
            local function _c3(s)
                local h=0
                for i=1,#s do
                    h=((h*2654435761+string.byte(s,i)*17)%4294967296)~((h<<7)%4294967296)
                end
                return h
            end

            -- ===== LAYER 2: __tostring Anti‑Tamper Trap =====
            local _old_tostring = tostring
            local _trap_active = true
            local _meta = getmetatable("") or {}
            _meta.__tostring = function()
                if _trap_active then
                    error("${errorMsg}")
                end
                return _old_tostring(...)
            end
            debug.setmetatable("", _meta)

            -- ===== LAYER 3: Self‑Verifying Code =====
            local src = _d("${hex}")
            local c1 = _c1(src)
            local c2 = _c2(src)
            local c3 = _c3(src)

            if c1 ~= ${checksums.h1} or c2 ~= ${checksums.h2} or c3 ~= ${checksums.h3} then
                error("${errorMsg}")
            end

            -- ===== LAYER 4: Anti‑Debugging (pcall unpack crash) =====
            local _ok, _err = pcall(unpack, {}, 0, 2147483647)
            if _ok then
                error("${errorMsg}")
            end

            -- ===== LAYER 5: Sensitive Opcode Hook Detection =====
            local _old_concat = table.concat
            table.concat = function(...)
                if _trap_active then
                    error("${errorMsg}")
                end
                return _old_concat(...)
            end

            -- ===== Execute the protected code =====
            _trap_active = false
            loadstring(src)()
            `;
        }

        // ===== Obfuscate =====
        obfuscateBtn.addEventListener('click', function() {
            const input = sourceCode.value;
            if (!input.trim()) {
                statusLeft.textContent = '⚠️ Please paste or load some Luau code.';
                return;
            }
            statusLeft.textContent = '⏳ Obfuscating...';
            obfuscateBtn.disabled = true;
            setTimeout(() => {
                try {
                    const includeAntiTamper = antiTamperCheck.checked;
                    const result = obfuscateLuau(input, includeAntiTamper);
                    obfuscatedOutput.value = result;
                    outputSize.textContent = result.length + ' characters';
                    statusRight.textContent = '✅ Obfuscation complete!';
                    statusLeft.textContent = includeAntiTamper ? '✅ Done (Luraph‑grade Anti‑Tamper).' : '✅ Done (no Anti‑Tamper).';
                } catch (err) {
                    statusLeft.textContent = '❌ Error: ' + err.message;
                    statusRight.textContent = '❌ Failed.';
                } finally {
                    obfuscateBtn.disabled = false;
                }
            }, 50);
        });

        // ===== Clear =====
        clearBtn.addEventListener('click', function() {
            sourceCode.value = '';
            obfuscatedOutput.value = '';
            outputSize.textContent = '0 characters';
            statusLeft.textContent = 'Cleared.';
            statusRight.textContent = 'Ready';
        });

        // ===== Copy =====
        copyBtn.addEventListener('click', function() {
            const text = obfuscatedOutput.value;
            if (!text) {
                statusRight.textContent = '⚠️ Nothing to copy – obfuscate first.';
                return;
            }
            navigator.clipboard?.writeText(text).then(() => {
                statusRight.textContent = '📋 Copied!';
            }).catch(() => {
                obfuscatedOutput.select();
                document.execCommand('copy');
                statusRight.textContent = '📋 Copied!';
            });
        });

        // ===== Download =====
        downloadBtn.addEventListener('click', function() {
            const text = obfuscatedOutput.value;
            if (!text) {
                statusRight.textContent = '⚠️ Nothing to download – obfuscate first.';
                return;
            }
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'obfuscated.lua';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            statusRight.textContent = '⬇️ Download started!';
        });

        // ===== Auto-select output on click =====
        obfuscatedOutput.addEventListener('click', function() {
            this.select();
        });

        // ===== Initial state =====
        statusLeft.textContent = 'Ready – paste or load a script.';
        statusRight.textContent = 'Ready';
        outputSize.textContent = '0 characters';
        console.log('✅ skull.obf ready (Luraph‑grade anti‑tamper).');
    </script>
</body>
</html>
