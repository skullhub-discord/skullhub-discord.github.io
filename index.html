<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luau Obfuscator Interface</title>
    <style>
        :root {
            --bg-color: #0a0b0d;
            --panel-color: #111318;
            --accent-color: #0077ff;
            --accent-glow: rgba(0, 119, 255, 0.4);
            --text-main: #ffffff;
            --text-muted: #6c757d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Trigger Button centered on screen */
        .open-btn {
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--accent-color);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            box-shadow: 0 0 10px var(--accent-glow);
            transition: all 0.3s ease;
        }

        .open-btn:hover {
            background: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-color);
            transform: translateY(-2px);
        }

        /* Bottom Sheet Panel */
        .panel-container {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 100%); /* Start hidden under the screen */
            width: 100%;
            max-width: 800px;
            background-color: var(--panel-color);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            border: 1px solid rgba(0, 119, 255, 0.3);
            border-bottom: none;
            box-shadow: 0 -10px 35px var(--accent-glow);
            padding: 24px;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }

        /* Active state to pop up */
        .panel-container.active {
            transform: translate(-50%, 0);
        }

        /* Drag handle indicator accent */
        .panel-handle {
            width: 50px;
            height: 4px;
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
            border-radius: 2px;
            margin: 0 auto 20px auto;
            cursor: pointer;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .panel-title {
            color: var(--text-main);
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #ff4444;
        }

        /* Interface Content Elements */
        .upload-zone {
            border: 2px dashed rgba(0, 119, 255, 0.2);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: border-color 0.3s, background-color 0.3s;
        }

        .upload-zone:hover {
            border-color: var(--accent-color);
            background: rgba(0, 119, 255, 0.05);
        }

        .upload-text {
            color: var(--text-main);
            font-size: 15px;
            margin-bottom: 8px;
        }

        .upload-subtext {
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <!-- Main Button to toggle UI -->
    <button class="open-btn" onclick="togglePanel()">Launch Obfuscator UI</button>

    <!-- Glowing Bottom Panel -->
    <div class="panel-container" id="obfuscatorPanel">
        <div class="panel-handle" onclick="togglePanel()"></div>
        
        <div class="panel-header">
            <div class="panel-title">Universal Anti-Dump Obfuscator</div>
            <button class="close-btn" onclick="togglePanel()">&times;</button>
        </div>

        <div class="upload-zone">
            <div class="upload-text">Drag & Drop your Luau script here</div>
            <div class="upload-subtext">Supports .lua or .txt files</div>
        </div>
    </div>

    <script>
        function togglePanel() {
            const panel = document.getElementById('obfuscatorPanel');
            panel.classList.toggle('active');
        }
    </script>
</body>
</html>
