<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luau Obfuscator Interface</title>
    <style>
        :root {
            --bg-color: #0a0b0d;
            --panel-color: #111318;
            --accent-color: #0077ff;
            --accent-glow: rgba(0, 119, 255, 0.4);
            --text-main: #ffffff;
            --text-muted: #6c757d;
            --input-bg: #161920;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .open-btn {
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--accent-color);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            box-shadow: 0 0 10px var(--accent-glow);
            transition: all 0.3s ease;
        }

        .open-btn:hover {
            background: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-color);
            transform: translateY(-2px);
        }

        .panel-container {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 100%);
            width: 100%;
            max-width: 800px;
            background-color: var(--panel-color);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            border: 1px solid rgba(0, 119, 255, 0.3);
            border-bottom: none;
            box-shadow: 0 -10px 35px var(--accent-glow);
            padding: 24px;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            max-height: 90vh;
            overflow-y: auto;
        }

        .panel-container.active {
            transform: translate(-50%, 0);
        }

        .panel-handle {
            width: 50px;
            height: 4px;
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
            border-radius: 2px;
            margin: 0 auto 20px auto;
            cursor: pointer;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .panel-title {
            color: var(--text-main);
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #ff4444;
        }

        /* Tabs */
        .tab-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 6px 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }

        .tab-btn.active {
            color: var(--accent-color);
            text-shadow: 0 0 8px var(--accent-glow);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Upload zone */
        .upload-zone {
            border: 2px dashed rgba(0, 119, 255, 0.2);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: border-color 0.3s, background-color 0.3s;
        }

        .upload-zone:hover {
            border-color: var(--accent-color);
            background: rgba(0, 119, 255, 0.05);
        }

        .upload-text {
            color: var(--text-main);
            font-size: 15px;
            margin-bottom: 8px;
        }

        .upload-subtext {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Text areas */
        .text-zone {
            width: 100%;
            height: 150px;
            background-color: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
        }

        .text-zone:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(0, 119, 255, 0.2);
        }

        .output-area {
            margin-top: 12px;
            display: none;
        }

        .output-area.active {
            display: block;
        }

        .output-area .text-zone {
            height: 120px;
            background-color: #0d0f14;
            color: #8fff8f;
        }

        /* Action buttons */
        .action-btn {
            width: 100%;
            background: var(--accent-color);
            color: var(--text-main);
            border: none;
            padding: 12px;
            margin-top: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
            transition: background 0.2s, box-shadow 0.2s;
        }

        .action-btn:hover {
            background: #0066dd;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-group .action-btn {
            flex: 1;
            margin-top: 0;
            padding: 10px;
            font-size: 14px;
        }

        .btn-group .action-btn.secondary {
            background: #2a2f3a;
            box-shadow: none;
        }

        .btn-group .action-btn.secondary:hover {
            background: #3a4050;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

    <button class="open-btn" onclick="togglePanel()">Launch Obfuscator UI</button>

    <div class="panel-container" id="obfuscatorPanel">
        <div class="panel-handle" onclick="togglePanel()"></div>

        <div class="panel-header">
            <div class="panel-title">Universal Anti-Dump Obfuscator</div>
            <button class="close-btn" onclick="togglePanel()">&times;</button>
        </div>

        <!-- Navigation Tabs -->
        <div class="tab-menu">
            <button class="tab-btn active" id="fileTabBtn" onclick="switchTab('file-tab', this)">File Upload</button>
            <button class="tab-btn" id="textTabBtn" onclick="switchTab('text-tab', this)">Raw Code</button>
        </div>

        <!-- Tab: File Upload -->
        <div id="file-tab" class="tab-content active">
            <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="upload-text">Drag &amp; Drop your Luau script here</div>
                <div class="upload-subtext">Supports .lua or .txt files</div>
                <input type="file" id="fileInput" style="display: none;" accept=".lua,.txt" />
            </div>
            <div id="fileStatus" class="status" style="margin-top: 8px;"></div>
        </div>

        <!-- Tab: Raw Code Input -->
        <div id="text-tab" class="tab-content">
            <textarea class="text-zone" id="sourceCode" placeholder="-- Paste your Luau source code directly here..."></textarea>
        </div>

        <!-- Obfuscate Button -->
        <button class="action-btn" id="obfuscateBtn">Obfuscate Script</button>

        <!-- Output Area with Copy & Download -->
        <div class="output-area" id="outputArea">
            <textarea class="text-zone" id="obfuscatedOutput" readonly></textarea>
            <div class="btn-group">
                <button class="action-btn secondary" id="copyBtn">📋 Copy All</button>
                <button class="action-btn secondary" id="downloadBtn">⬇️ Download</button>
            </div>
        </div>

        <div class="status" id="statusMessage">Ready</div>
    </div>

    <script>
        // ===== DOM references =====
        const panel = document.getElementById('obfuscatorPanel');
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const sourceCode = document.getElementById('sourceCode');
        const obfuscateBtn = document.getElementById('obfuscateBtn');
        const outputArea = document.getElementById('outputArea');
        const obfuscatedOutput = document.getElementById('obfuscatedOutput');
        const statusMsg = document.getElementById('statusMessage');
        const fileStatus = document.getElementById('fileStatus');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        // ===== Panel toggle =====
        function togglePanel() {
            panel.classList.toggle('active');
            if (!panel.classList.contains('active')) {
                outputArea.classList.remove('active');
                statusMsg.textContent = 'Ready';
            }
        }

        // ===== Tab switching =====
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            outputArea.classList.remove('active');
            statusMsg.textContent = 'Ready';
        }

        // ===== File upload =====
        fileInput.addEventListener('change', function(e) {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                sourceCode.value = ev.target.result;
                fileStatus.textContent = `✅ Loaded: ${file.name} (${file.size} bytes)`;
                const textTabBtn = document.getElementById('textTabBtn');
                switchTab('text-tab', textTabBtn);
            };
            reader.onerror = function() {
                fileStatus.textContent = '❌ Failed to read file.';
            };
            reader.readAsText(file);
        });

        // ===== Drag and drop =====
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.style.borderColor = 'var(--accent-color)';
            this.style.background = 'rgba(0, 119, 255, 0.1)';
        });

        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.style.borderColor = 'rgba(0, 119, 255, 0.2)';
            this.style.background = 'rgba(0, 0, 0, 0.2)';
        });

        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            this.style.borderColor = 'rgba(0, 119, 255, 0.2)';
            this.style.background = 'rgba(0, 0, 0, 0.2)';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                fileInput.dispatchEvent(new Event('change'));
            }
        });

        // ===== Simple obfuscation (base64 + loader) =====
        function obfuscateLuau(code) {
            let cleaned = code.replace(/--[^\n]*/g, '');
            cleaned = cleaned.replace(/\s+/g, ' ').trim();
            let b64 = btoa(unescape(encodeURIComponent(cleaned)));
            return `--[[ Obfuscated by Universal Anti-Dump ]]\nlocal _ = loadstring((function()\nlocal t = "${b64}"\nreturn (function(s) return (s:gsub('..', function(c) return string.char(tonumber(c, 16)) end)) end)(t:gsub('..', function(c) return string.format('%02x', string.byte(c)) end))\nend)())()\n`;
        }

        // ===== Obfuscate button =====
        obfuscateBtn.addEventListener('click', function() {
            const inputCode = sourceCode.value.trim();
            if (!inputCode) {
                statusMsg.textContent = '⚠️ Please paste or load some Luau code first.';
                outputArea.classList.remove('active');
                return;
            }
            statusMsg.textContent = '⏳ Obfuscating...';
            obfuscateBtn.disabled = true;
            setTimeout(() => {
                try {
                    const result = obfuscateLuau(inputCode);
                    obfuscatedOutput.value = result;
                    outputArea.classList.add('active');
                    statusMsg.textContent = '✅ Obfuscation complete! Copy or download below.';
                } catch (err) {
                    statusMsg.textContent = '❌ Error: ' + err.message;
                    outputArea.classList.remove('active');
                } finally {
                    obfuscateBtn.disabled = false;
                }
            }, 300);
        });

        // ===== Copy All =====
        copyBtn.addEventListener('click', function() {
            const text = obfuscatedOutput.value;
            if (!text) {
                statusMsg.textContent = '⚠️ Nothing to copy – obfuscate first.';
                return;
            }
            navigator.clipboard?.writeText(text).then(() => {
                statusMsg.textContent = '📋 Copied to clipboard!';
            }).catch(() => {
                // Fallback
                obfuscatedOutput.select();
                document.execCommand('copy');
                statusMsg.textContent = '📋 Copied!';
            });
        });

        // ===== Download =====
        downloadBtn.addEventListener('click', function() {
            const text = obfuscatedOutput.value;
            if (!text) {
                statusMsg.textContent = '⚠️ Nothing to download – obfuscate first.';
                return;
            }
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'obfuscated.lua';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            statusMsg.textContent = '⬇️ Download started!';
        });

        // ===== Auto-copy on click into textarea (optional) =====
        obfuscatedOutput.addEventListener('click', function() {
            this.select();
        });

        // ===== Init =====
        outputArea.classList.remove('active');
        console.log('✅ Luau Obfuscator Interface ready.');
    </script>
</body>
</html>
