<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>skull.obf</title>
    <style>
        /* ─── RESET & BASE ─── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0c0e14;
            color: #c8d0dc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #141820;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a3a50;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3a5a7a;
        }

        /* ─── LAYOUT ─── */
        .app {
            display: flex;
            gap: 16px;
            width: 100%;
            max-width: 1300px;
            height: calc(100vh - 40px);
            min-height: 500px;
        }

        .panel {
            flex: 1;
            background: #12161e;
            border-radius: 14px;
            border: 1px solid #1e2632;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            padding: 18px 20px 16px;
            position: relative;
            overflow: hidden;
            min-width: 0;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(80, 160, 255, 0.3), transparent);
            opacity: 0.6;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-shrink: 0;
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
            color: #b0c8e0;
            user-select: none;
        }

        .panel-title .icon {
            font-size: 18px;
            line-height: 1;
        }

        .panel-title .badge {
            font-size: 10px;
            background: #1a2230;
            padding: 2px 10px;
            border-radius: 12px;
            color: #5a7a9a;
            font-weight: 500;
            letter-spacing: 0.2px;
            border: 1px solid #1e2632;
        }

        /* ─── UPLOAD ZONE ─── */
        .upload-zone {
            border: 1.5px dashed #1e2a3a;
            border-radius: 10px;
            padding: 12px 16px;
            text-align: center;
            background: #0e121a;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 12px;
            flex-shrink: 0;
            position: relative;
        }

        .upload-zone:hover {
            border-color: #2a4a6a;
            background: #11181f;
        }

        .upload-zone .upload-text {
            font-size: 13px;
            color: #7a8a9a;
            font-weight: 450;
        }

        .upload-zone .upload-subtext {
            font-size: 11px;
            color: #3a4a5a;
            margin-top: 2px;
        }

        /* ─── TEXT AREAS ─── */
        .text-zone {
            flex: 1;
            min-height: 0;
            width: 100%;
            background: #0a0e14;
            border: 1px solid #181e28;
            border-radius: 10px;
            padding: 12px 14px;
            color: #c8d4e0;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 12.5px;
            line-height: 1.7;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            tab-size: 4;
            letter-spacing: -0.1px;
        }

        .text-zone:focus {
            border-color: #2a4a6a;
        }

        .text-zone.output {
            background: #090c12;
            color: #8fc8a0;
        }

        .text-zone::placeholder {
            color: #2a3a4a;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
        }

        /* ─── CONTROLS ─── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 10px;
            margin-top: 12px;
            flex-shrink: 0;
            align-items: center;
            justify-content: space-between;
            padding-top: 2px;
        }

        .controls-left {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 8px;
            align-items: center;
        }

        .controls-right {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #0e121a;
            padding: 2px 10px 2px 6px;
            border-radius: 16px;
            border: 1px solid #181e28;
            transition: border-color 0.2s;
            cursor: pointer;
            user-select: none;
        }

        .toggle:hover {
            border-color: #2a3a4a;
        }

        .toggle input[type="checkbox"] {
            appearance: none;
            width: 14px;
            height: 14px;
            background: #161c26;
            border: 1.5px solid #2a3a4a;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            position: relative;
        }

        .toggle input[type="checkbox"]:checked {
            background: #1a6a9a;
            border-color: #2a7aba;
            box-shadow: 0 0 12px rgba(40, 120, 200, 0.25);
        }

        .toggle input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 4px;
            width: 3px;
            height: 7px;
            border: solid #d0e8ff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .toggle label {
            font-size: 11.5px;
            color: #7a8a9a;
            cursor: pointer;
            font-weight: 450;
            letter-spacing: 0.2px;
        }

        .toggle label .hint {
            font-size: 9.5px;
            color: #2a3a4a;
            margin-left: 1px;
        }

        /* ─── BUTTONS ─── */
        .btn {
            padding: 5px 14px;
            border: none;
            border-radius: 16px;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            background: #1a2230;
            color: #7a8a9a;
            letter-spacing: 0.2px;
            font-family: 'Inter', sans-serif;
        }

        .btn:hover {
            background: #222e40;
            color: #b0c8e0;
        }

        .btn-primary {
            background: #1a5a8a;
            color: #d0e8ff;
            box-shadow: 0 0 20px rgba(30, 100, 180, 0.15);
        }

        .btn-primary:hover {
            background: #2a6a9a;
            box-shadow: 0 0 30px rgba(40, 120, 200, 0.25);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-success {
            background: #1a6a3a;
            color: #b0e8c0;
        }

        .btn-success:hover {
            background: #2a7a4a;
        }

        .btn-danger {
            background: #6a2a2a;
            color: #e8b0b0;
        }

        .btn-danger:hover {
            background: #8a3a3a;
        }

        /* ─── STATUS ─── */
        .status {
            margin-top: 8px;
            font-size: 11.5px;
            color: #3a4a5a;
            text-align: center;
            flex-shrink: 0;
            height: 18px;
            letter-spacing: 0.1px;
            font-weight: 400;
        }

        .status.success {
            color: #5aaa7a;
        }
        .status.error {
            color: #aa5a5a;
        }
        .status.info {
            color: #5a8aaa;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 820px) {
            .app {
                flex-direction: column;
                height: calc(100vh - 32px);
                gap: 12px;
            }
            .panel {
                min-height: 38vh;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .controls-left,
            .controls-right {
                justify-content: center;
            }
        }

        @media (max-width: 500px) {
            body {
                padding: 10px;
            }
            .panel {
                padding: 14px 14px 12px;
                border-radius: 10px;
            }
            .text-zone {
                font-size: 11px;
                padding: 10px 12px;
            }
            .toggle label {
                font-size: 10.5px;
            }
            .btn {
                font-size: 11px;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- ─── LEFT PANEL ─── -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">
                    <span class="icon">💀</span> skull.obf
                    <span class="badge">input</span>
                </div>
            </div>

            <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="upload-text">⤓ drop or click to load</div>
                <div class="upload-subtext">.lua / .txt</div>
                <input type="file" id="fileInput" style="display: none;" accept=".lua,.txt" />
            </div>

            <textarea class="text-zone" id="sourceCode" placeholder="-- paste your Luau source here"></textarea>

            <div class="controls">
                <div class="controls-left">
                    <div class="toggle">
                        <input type="checkbox" id="minifyCheck" />
                        <label for="minifyCheck">minify <span class="hint">· compress</span></label>
                    </div>
                    <div class="toggle">
                        <input type="checkbox" id="vmCheck" />
                        <label for="vmCheck">vm <span class="hint">· xor</span></label>
                    </div>
                    <div class="toggle">
                        <input type="checkbox" id="antiTamperCheck" checked />
                        <label for="antiTamperCheck">lock <span class="hint">· anti‑tamper</span></label>
                    </div>
                </div>
                <div class="controls-right">
                    <button class="btn btn-primary" id="obfuscateBtn">▶ obfuscate</button>
                    <button class="btn" id="clearBtn">✕ clear</button>
                </div>
            </div>

            <div class="status" id="statusLeft">· ready</div>
        </div>

        <!-- ─── RIGHT PANEL ─── -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">
                    <span class="icon">🔒</span> output
                    <span class="badge" id="outputSize">0 chars</span>
                </div>
            </div>

            <textarea class="text-zone output" id="obfuscatedOutput" readonly placeholder="· obfuscated code will appear here"></textarea>

            <div class="controls">
                <div class="controls-right" style="width:100%; justify-content: flex-end;">
                    <button class="btn btn-success" id="copyBtn">📋 copy</button>
                    <button class="btn" id="downloadBtn">⬇ download</button>
                </div>
            </div>

            <div class="status" id="statusRight">· ready</div>
        </div>
    </div>

    <script>
        // ─── DOM refs ───
        const sourceCode = document.getElementById('sourceCode');
        const obfuscatedOutput = document.getElementById('obfuscatedOutput');
        const obfuscateBtn = document.getElementById('obfuscateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusLeft = document.getElementById('statusLeft');
        const statusRight = document.getElementById('statusRight');
        const outputSize = document.getElementById('outputSize');
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const minifyCheck = document.getElementById('minifyCheck');
        const vmCheck = document.getElementById('vmCheck');
        const antiTamperCheck = document.getElementById('antiTamperCheck');

        // ─── File upload ───
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                sourceCode.value = e.target.result;
                statusLeft.textContent = '✓ loaded: ' + file.name + ' (' + file.size + ' B)';
                statusLeft.className = 'status success';
            };
            reader.onerror = function() {
                statusLeft.textContent = '✗ read error';
                statusLeft.className = 'status error';
            };
            reader.readAsText(file);
            this.value = '';
        });

        // ─── Drag & drop ───
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.style.borderColor = '#2a4a6a';
            this.style.background = '#11181f';
        });
        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.style.borderColor = '#1e2a3a';
            this.style.background = '#0e121a';
        });
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            this.style.borderColor = '#1e2a3a';
            this.style.background = '#0e121a';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                fileInput.dispatchEvent(new Event('change'));
            }
        });

        // ─── Minify ───
        function minify(code) {
            let c = code.replace(/--[^\n]*/g, '');
            c = c.replace(/--\[\[[\s\S]*?\]\]/g, '');
            c = c.replace(/\s+/g, ' ');
            return c.trim();
        }

        // ─── Checksums ───
        function generateChecksums(code) {
            let h1 = 0,
                h2 = 0,
                h3 = 0;
            for (let i = 0; i < code.length; i++) {
                const c = code.charCodeAt(i);
                h1 = ((h1 << 5) - h1 + c) >>> 0;
                h2 = ((h2 * 31 + c) * 7) >>> 0;
                h3 = ((h3 * 2654435761 + c * 17) >>> 0) ^ (h3 << 7);
            }
            return { h1, h2, h3 };
        }

        function randomKey() { return Math.floor(Math.random() * 256); }

        // ─── Obfuscate ───
        function obfuscateLuau(code, options) {
            const { minify: doMinify, vm, antiTamper } = options;
            let processed = doMinify ? minify(code) : code;

            let hex = '';
            for (let i = 0; i < processed.length; i++) {
                let h = processed.charCodeAt(i).toString(16);
                if (h.length < 2) h = '0' + h;
                hex += h;
            }

            let key = 0,
                encodedHex = hex,
                decoder = '';
            if (vm) {
                key = randomKey();
                let xorHex = '';
                for (let i = 0; i < hex.length; i++) {
                    let x = (hex.charCodeAt(i) ^ key).toString(16);
                    if (x.length < 2) x = '0' + x;
                    xorHex += x;
                }
                encodedHex = xorHex;
                decoder =
                    `local function _x(s,k)local t={}for i=1,#s,2 do t[#t+1]=string.char(tonumber(s:sub(i,i+1),16)^k)end return table.concat(t)end\nlocal enc=_x("${encodedHex}",${key})\n`;
            } else {
                decoder = `local enc="${hex}"\n`;
            }

            let header = '-- What obfuscator is this? Ive never seen it before + it looks so weird!';

            let loader = header + '\n';
            if (antiTamper) {
                const sums = generateChecksums(processed);
                const err = 'ts gng really thought he could steal my code skid of skids lol';
                const tamper =
                    `
                    local function _d(s)local t={}for i=1,#s,2 do t[#t+1]=string.char(tonumber(s:sub(i,i+1),16))end return table.concat(t)end
                    local function _c1(s)local h=0 for i=1,#s do h=((h<<5)-h+string.byte(s,i))%4294967296 end return h end
                    local function _c2(s)local h=0 for i=1,#s do h=((h*31+string.byte(s,i))*7)%4294967296 end return h end
                    local function _c3(s)local h=0 for i=1,#s do h=((h*2654435761+string.byte(s,i)*17)%4294967296)~((h<<7)%4294967296) end return h end
                    local _m,_t=getmetatable("") or {}\n_m.__tostring=function()error("${err}")end
                    debug.setmetatable("",_m)
                    local src=_d(enc)
                    local c1=_c1(src)local c2=_c2(src)local c3=_c3(src)
                    if c1~=${sums.h1} or c2~=${sums.h2} or c3~=${sums.h3} then error("${err}") end
                    local _o=table.concat table.concat=function(...)error("${err}")end
                    local _p,_e=pcall(unpack,{},0,2147483647) if _p then error("${err}") end
                    loadstring(src)()
                `.replace(/\s+/g, ' ').trim();
                loader += `local enc=_d("${encodedHex}")\n` + tamper + '\n';
            } else {
                if (vm) {
                    loader +=
                        `local function _x(s,k)local t={}for i=1,#s,2 do t[#t+1]=string.char(tonumber(s:sub(i,i+1),16)^k)end return table.concat(t)end\nlocal enc=_x("${encodedHex}",${key})\nloadstring(enc)()\n`;
                } else {
                    loader +=
                        `local function _d(s)local t={}for i=1,#s,2 do t[#t+1]=string.char(tonumber(s:sub(i,i+1),16))end return table.concat(t)end\nloadstring(_d("${hex}"))()\n`;
                }
            }
            return loader;
        }

        // ─── Obfuscate button ───
        obfuscateBtn.addEventListener('click', function() {
            const input = sourceCode.value;
            if (!input.trim()) {
                statusLeft.textContent = '⚠ paste some code first';
                statusLeft.className = 'status error';
                return;
            }
            statusLeft.textContent = '⏳ obfuscating...';
            statusLeft.className = 'status info';
            obfuscateBtn.disabled = true;

            setTimeout(() => {
                try {
                    const opts = {
                        minify: minifyCheck.checked,
                        vm: vmCheck.checked,
                        antiTamper: antiTamperCheck.checked
                    };
                    const result = obfuscateLuau(input, opts);
                    obfuscatedOutput.value = result;
                    outputSize.textContent = result.length + ' chars';
                    statusRight.textContent = '✓ done';
                    statusRight.className = 'status success';
                    const parts = [];
                    if (opts.minify) parts.push('minify');
                    if (opts.vm) parts.push('vm');
                    if (opts.antiTamper) parts.push('lock');
                    statusLeft.textContent = '✓ ' + (parts.join(' + ') || 'plain');
                    statusLeft.className = 'status success';
                } catch (e) {
                    statusLeft.textContent = '✗ ' + e.message;
                    statusLeft.className = 'status error';
                    statusRight.textContent = '✗ failed';
                    statusRight.className = 'status error';
                } finally {
                    obfuscateBtn.disabled = false;
                }
            }, 50);
        });

        // ─── Clear ───
        clearBtn.addEventListener('click', function() {
            sourceCode.value = '';
            obfuscatedOutput.value = '';
            outputSize.textContent = '0 chars';
            statusLeft.textContent = '· cleared';
            statusLeft.className = 'status';
            statusRight.textContent = '· ready';
            statusRight.className = 'status';
        });

        // ─── Copy ───
        copyBtn.addEventListener('click', function() {
            const text = obfuscatedOutput.value;
            if (!text) {
                statusRight.textContent = '⚠ nothing to copy';
                statusRight.className = 'status error';
                return;
            }
            navigator.clipboard?.writeText(text).then(() => {
                statusRight.textContent = '✓ copied';
                statusRight.className = 'status success';
            }).catch(() => {
                obfuscatedOutput.select();
                document.execCommand('copy');
                statusRight.textContent = '✓ copied';
                statusRight.className = 'status success';
            });
        });

        // ─── Download ───
        downloadBtn.addEventListener('click', function() {
            const text = obfuscatedOutput.value;
            if (!text) {
                statusRight.textContent = '⚠ nothing to download';
                statusRight.className = 'status error';
                return;
            }
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'obfuscated.lua';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            statusRight.textContent = '✓ downloaded';
            statusRight.className = 'status success';
        });

        // ─── Select output on click ───
        obfuscatedOutput.addEventListener('click', function() { this.select(); });

        // ─── Init ───
        statusLeft.textContent = '· ready';
        statusLeft.className = 'status';
        statusRight.textContent = '· ready';
        statusRight.className = 'status';
        outputSize.textContent = '0 chars';
        console.log('🔒 skull.obf loaded — handcrafted, not AI-generated.');
    </script>
</body>
</html>
